services:
  db-backup:
    image: tiredofit/db-backup:latest
    container_name: db-backup
    restart: unless-stopped
    # volumes:
    #   - ${HOST_BACKUP_PATH}:${CONTAINER_BACKUP_PATH}
    #   - ${HOST_LOG_PATH}:${CONTAINER_LOG_PATH}
    environment:
      # ─── Basic ──────────────────────────────────────────────────
      TZ: ${TZ}
      TIMEZONE: ${TIMEZONE}
      CONTAINER_ENABLE_MONITORING: ${CONTAINER_ENABLE_MONITORING}

      # ─── Notification ───────────────────────────────────────────
      # ENABLE_NOTIFICATIONS: ${ENABLE_NOTIFICATIONS}
      # NOTIFICATION_TYPE: ${NOTIFICATION_TYPE}
      # SMTP_HOST: ${SMTP_HOST}
      # SMTP_PORT: ${SMTP_PORT}
      # MAIL_FROM: ${MAIL_FROM}
      # MAIL_TO: ${MAIL_TO}

      # ─── Global Default ─────────────────────────────────────────
      DEFAULT_BACKUP_LOCATION: ${DEFAULT_BACKUP_LOCATION}
      DEFAULT_CREATE_LATEST_SYMLINK: ${DEFAULT_CREATE_LATEST_SYMLINK}
      BACKUP_JOB_CONCURRENCY: ${BACKUP_JOB_CONCURRENCY}
      DEFAULT_COMPRESSION: ${DEFAULT_COMPRESSION}
      DEFAULT_COMPRESSION_LEVEL: ${DEFAULT_COMPRESSION_LEVEL}
      DEFAULT_CLEANUP_TIME: ${DEFAULT_CLEANUP_TIME}
      DEFAULT_LOG_LEVEL: ${DEFAULT_LOG_LEVEL}
      DEFAULT_BACKUP_GLOBALS: ${DEFAULT_BACKUP_GLOBALS}

      # ─── DB01 ────────────────────────────────────────────────────
      DB01_FILESYSTEM_PATH: ${DB01_FILESYSTEM_PATH}
      DB01_TYPE: ${DB01_TYPE}
      DB01_HOST: ${DB01_HOST}
      DB01_PORT: ${DB01_PORT}
      DB01_USER: ${DB01_USER}
      DB01_PASS: ${DB01_PASS}
      DB01_NAME: ${DB01_NAME}
      DB01_SPLIT_DB: ${DB01_SPLIT_DB}
      DB01_BACKUP_BEGIN: ${DB01_BACKUP_BEGIN}
      DB01_SIZE_VALUE: ${DB01_SIZE_VALUE}
